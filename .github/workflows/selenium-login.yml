name: E2E Selenium Testing Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Start Local Mock Server (Optional / For testing localhost)
      # If you need to spin up the local server first, you can run:
      # run: npm run dev &
      run: echo "Testing directly against deployed live environment"

    - name: Set up Chrome & ChromeDriver
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Install E2E Test Dependencies
      run: |
        cd frontend/selenium-tests
        npm install

    - name: Run Headless Selenium Tests
      run: |
        cd frontend/selenium-tests
        # Run tests using headless Chrome configuration
        export CHROME_PATH=$(which google-chrome)
        npm run test

    - name: Upload Selenium Test Excel Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: selenium-test-report
        path: react_web_tests/test_report.xlsx
    
    - name: Upload Load Test Excel Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: load-test-report
        path: react_web_tests/load_test_report.xlsx
